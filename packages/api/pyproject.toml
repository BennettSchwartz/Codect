[project]
name = "api"
version = "0.1.0"
description = "API for Codect AI Generated Code Detection"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "fastapi>=0.136.3",
    "pytest>=9.0.3",
    "uvicorn>=0.48.0",
]

[tool.ruff]
line-length=120

select = ["E", "F"]
ignore = ["E501"]
fixable = ["A", "B", "C", "D", "E", "F"]
exclude = [".venv", "__pycache__", ".git", "migrations"]

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]
